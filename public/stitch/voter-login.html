<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline": "#757681",
              "inverse-primary": "#b6c4ff",
              "on-error-container": "#93000a",
              "secondary-fixed": "#ffddb3",
              "error-container": "#ffdad6",
              "surface-tint": "#495b9c",
              "surface": "#f7f9ff",
              "surface-variant": "#d1e4fb",
              "on-primary-container": "#8799df",
              "on-surface-variant": "#454650",
              "secondary-fixed-dim": "#ffb951",
              "on-secondary-fixed": "#291800",
              "on-error": "#ffffff",
              "tertiary-container": "#582500",
              "background": "#f7f9ff",
              "inverse-on-surface": "#e8f2ff",
              "inverse-surface": "#203243",
              "tertiary": "#371500",
              "on-surface": "#091d2e",
              "surface-container-high": "#d9eaff",
              "secondary": "#825500",
              "error": "#ba1a1a",
              "primary": "#001857",
              "surface-container-low": "#edf4ff",
              "on-primary-fixed-variant": "#304382",
              "surface-bright": "#f7f9ff",
              "primary-fixed-dim": "#b6c4ff",
              "surface-container": "#e3efff",
              "on-secondary-fixed-variant": "#633f00",
              "tertiary-fixed": "#ffdbc9",
              "on-tertiary-fixed-variant": "#703710",
              "surface-container-highest": "#d1e4fb",
              "outline-variant": "#c5c5d2",
              "secondary-container": "#fdab12",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#d68a5c",
              "primary-fixed": "#dce1ff",
              "on-tertiary": "#ffffff",
              "on-secondary": "#ffffff",
              "tertiary-fixed-dim": "#ffb68c",
              "on-primary-fixed": "#001550",
              "on-tertiary-fixed": "#321200",
              "on-background": "#091d2e",
              "primary-container": "#1b2f6e",
              "on-primary": "#ffffff",
              "on-secondary-container": "#684300",
              "surface-dim": "#c9dcf3"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(247, 249, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col items-center">
<!-- TopAppBar Semantic Shell - Suppressed for Focused Journey but maintaining Branding -->
<header class="w-full flex justify-center items-center px-6 py-8 z-50">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-primary flex items-center justify-center rounded-lg shadow-lg">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<span class="font-headline font-extrabold tracking-tighter text-2xl text-primary">VoteSecure</span>
</div>
</header>
<!-- Main Canvas -->
<main class="w-full max-w-md px-6 flex-grow flex flex-col">
<!-- Welcome Section -->
<section class="mt-12 mb-10 text-center lg:text-left">
<h1 class="font-headline font-extrabold text-4xl text-on-surface tracking-tight leading-tight">
                Welcome, Voter
            </h1>
<p class="text-on-surface-variant text-lg mt-3 font-medium leading-relaxed">
                Enter your registered mobile number to receive OTP
            </p>
</section>
<!-- Login Form Card -->
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_8px_24px_rgba(9,29,46,0.04)]">
<form class="space-y-8">
<div class="space-y-2">
<label class="text-sm font-bold text-on-surface uppercase tracking-wider block ml-1" for="mobile-input">
                        Mobile Number
                    </label>
<!-- Input Cluster -->
<div class="flex gap-2">
<!-- Country Code Dropdown -->
<div class="relative min-w-[90px]">
<select class="w-full appearance-none bg-surface-container-low border border-outline-variant/20 rounded-lg py-4 px-4 text-on-surface font-mono font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
<option>+91</option>
<option>+1</option>
<option>+44</option>
<option>+61</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
<!-- Main Number Input -->
<div class="relative flex-grow">
<input class="w-full bg-surface-container-low border border-outline-variant/20 rounded-lg py-4 px-4 text-on-surface font-mono font-medium tracking-widest placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all" id="mobile-input" inputmode="numeric" pattern="[0-9]{10}" placeholder="10-digit number" type="tel"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">smartphone</span>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[56px] bg-secondary-container text-on-secondary-container font-headline font-bold text-lg rounded-full shadow-md active:scale-95 transition-transform duration-150 flex items-center justify-center gap-2" type="submit">
                    Send OTP
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Tonal Divider -->
<div class="mt-8 pt-6 flex flex-col items-center text-center">
<div class="h-[1px] w-full bg-outline-variant/10 mb-6"></div>
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container rounded-md">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="text-[11px] font-bold text-on-surface-variant uppercase tracking-widest leading-none">
                        Only registered voters can access this system
                    </p>
</div>
</div>
</div>
<!-- Verification Illustration Space / Subtle Branding -->
<div class="mt-12 flex justify-center opacity-10">
<span class="material-symbols-outlined text-9xl">fingerprint</span>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-10 px-6 mt-auto">
<div class="max-w-md mx-auto text-center">
<p class="text-on-surface-variant text-sm font-medium">
                Having trouble? 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">
                    Contact Election Administrator
                </a>
</p>
<div class="mt-6 flex justify-center gap-4 text-xs font-mono text-on-surface-variant/40">
<span>VER: 2.4.0-SECURE</span>
<span>•</span>
<span>ENC: AES-256</span>
</div>
</div>
</footer>
<!-- Image for Decorative Background Texture (Invisible but providing prompt) -->
<img class="fixed inset-0 w-full h-full object-cover -z-10 opacity-[0.03] pointer-events-none" data-alt="ultra subtle geometric pattern of interlocking circles in soft light blue on a clean white background with grainy paper texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABt3tFXIO-rPSX24EWrk4SjZqaLePP3c9a_NpX4THv_6D7iHL05c9FErwC5DdZIB4y0iX0S_tTHxEowGUPntIuq0TOw4Ub99KIJbuP4xKjUeQ3v_r67KRNSxK_5r--tltESM1Hv-f_CSNa0JiUD1971IH_FxXlozJqZx_k4f9Q7fLdq2xM1GxyViOR047WU6IgR1bV0boESHmGJwiEUAo0LLYB_QtfuTiuweVOUFZlc6pz92J6IGNdRTW9E45aVp4RgzIlGADIsUCy"/>
</body></html>
