<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OTP Verification | VoteSecure</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline": "#757681",
              "inverse-primary": "#b6c4ff",
              "on-error-container": "#93000a",
              "secondary-fixed": "#ffddb3",
              "error-container": "#ffdad6",
              "surface-tint": "#495b9c",
              "surface": "#f7f9ff",
              "surface-variant": "#d1e4fb",
              "on-primary-container": "#8799df",
              "on-surface-variant": "#454650",
              "secondary-fixed-dim": "#ffb951",
              "on-secondary-fixed": "#291800",
              "on-error": "#ffffff",
              "tertiary-container": "#582500",
              "background": "#f7f9ff",
              "inverse-on-surface": "#e8f2ff",
              "inverse-surface": "#203243",
              "tertiary": "#371500",
              "on-surface": "#091d2e",
              "surface-container-high": "#d9eaff",
              "secondary": "#825500",
              "error": "#ba1a1a",
              "primary": "#001857",
              "surface-container-low": "#edf4ff",
              "on-primary-fixed-variant": "#304382",
              "surface-bright": "#f7f9ff",
              "primary-fixed-dim": "#b6c4ff",
              "surface-container": "#e3efff",
              "on-secondary-fixed-variant": "#633f00",
              "tertiary-fixed": "#ffdbc9",
              "on-tertiary-fixed-variant": "#703710",
              "surface-container-highest": "#d1e4fb",
              "outline-variant": "#c5c5d2",
              "secondary-container": "#fdab12",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#d68a5c",
              "primary-fixed": "#dce1ff",
              "on-tertiary": "#ffffff",
              "on-secondary": "#ffffff",
              "tertiary-fixed-dim": "#ffb68c",
              "on-primary-fixed": "#001550",
              "on-tertiary-fixed": "#321200",
              "on-background": "#091d2e",
              "primary-container": "#1b2f6e",
              "on-primary": "#ffffff",
              "on-secondary-container": "#684300",
              "surface-dim": "#c9dcf3"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom ring for active OTP box as requested */
        .otp-input:focus {
            border-color: #001857;
            box-shadow: 0 0 0 4px rgba(27, 47, 110, 0.15);
            outline: none;
        }
        .otp-filled {
            background-color: #001857;
            color: #ffffff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation (Contextual Suppression of BottomNav/SideNav for Transactional Screen) -->
<header class="w-full top-0 z-50 flex justify-between items-center px-6 py-4 bg-[#f7f9ff] backdrop-blur-md bg-opacity-40">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="font-headline font-bold tracking-tighter text-lg text-primary">VoteSecure</div>
<div class="w-10"></div> <!-- Spacer for centering title -->
</header>
<main class="flex-grow flex flex-col items-center px-6 pt-12 max-w-md mx-auto w-full">
<!-- Visual Anchor (Asymmetric Icon Layering) -->
<div class="relative mb-8 w-24 h-24">
<div class="absolute inset-0 bg-primary-fixed opacity-20 rounded-3xl rotate-12"></div>
<div class="absolute inset-0 bg-surface-container-high rounded-3xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shield_person</span>
</div>
</div>
<!-- Headline & Subtext -->
<div class="text-center space-y-3 mb-12">
<h1 class="font-headline font-bold text-3xl tracking-tight text-on-surface">Verify Your Identity</h1>
<p class="text-on-surface-variant text-lg leading-relaxed">
                Enter the 6-digit OTP sent to <span class="font-mono font-semibold text-primary">+91-XXXXXX1234</span>
</p>
</div>
<!-- OTP Input Cluster -->
<div class="grid grid-cols-6 gap-3 mb-8 w-full">
<!-- First box shown as active/focused intent -->
<input class="otp-input w-full aspect-square text-center font-mono text-2xl font-bold bg-surface-container-lowest border-2 border-outline-variant rounded-xl transition-all duration-200" maxlength="1" type="text" value="4"/>
<input class="otp-input w-full aspect-square text-center font-mono text-2xl font-bold bg-surface-container-lowest border-2 border-outline-variant rounded-xl transition-all duration-200" maxlength="1" type="text" value="8"/>
<input class="otp-input w-full aspect-square text-center font-mono text-2xl font-bold bg-surface-container-lowest border-2 border-outline-variant rounded-xl transition-all duration-200" maxlength="1" type="text" value="2"/>
<!-- This box simulates the active state requested -->
<input autofocus="" class="otp-input w-full aspect-square text-center font-mono text-2xl font-bold bg-surface-container-lowest border-2 border-primary ring-4 ring-primary/15 rounded-xl transition-all duration-200" maxlength="1" type="text"/>
<input class="otp-input w-full aspect-square text-center font-mono text-2xl font-bold bg-surface-container-lowest border-2 border-outline-variant rounded-xl transition-all duration-200" maxlength="1" type="text"/>
<input class="otp-input w-full aspect-square text-center font-mono text-2xl font-bold bg-surface-container-lowest border-2 border-outline-variant rounded-xl transition-all duration-200" maxlength="1" type="text"/>
</div>
<!-- Timer & Resend -->
<div class="flex flex-col items-center space-y-4 mb-12">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-sm text-secondary">schedule</span>
<span class="font-mono text-sm font-medium text-on-surface-variant">Resend OTP in 00:45</span>
</div>
<button class="text-primary font-semibold text-sm hover:underline opacity-50 cursor-not-allowed">
                Resend SMS
            </button>
</div>
<!-- CTA Action -->
<button class="w-full bg-primary-container text-on-primary py-4 rounded-xl font-headline font-bold text-lg shadow-lg shadow-primary/10 active:scale-[0.98] transition-all duration-150 mb-6">
            Verify &amp; Proceed
        </button>
<!-- Security Note -->
<div class="bg-surface-container-low/50 p-4 rounded-xl flex items-start gap-3 w-full border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-xl mt-0.5">info</span>
<p class="text-sm text-on-surface-variant leading-tight">
                This OTP is valid for 5 minutes. Do not share it with anyone. VoteSecure staff will never ask for your code.
            </p>
</div>
<!-- Decorative Subtle Pattern (Asymmetric) -->
<div class="absolute bottom-0 right-0 -z-10 opacity-5 pointer-events-none">
<div class="w-64 h-64 bg-primary rounded-full blur-[100px] -mr-32 -mb-32"></div>
</div>
</main>
<!-- Footer Identity -->
<footer class="py-8 flex justify-center items-center opacity-40">
<div class="flex items-center gap-2 grayscale">
<span class="material-symbols-outlined text-sm">encrypted</span>
<span class="text-xs font-mono tracking-widest uppercase">End-to-End Encrypted Session</span>
</div>
</footer>
</body></html>
